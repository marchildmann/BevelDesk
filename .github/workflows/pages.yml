name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.13
      - name: Build WebAssembly
        run: |
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release
          cmake --build build-web -j
      - name: Assemble site
        run: |
          mkdir -p _site
          cp build-web/index.html build-web/index.js build-web/index.wasm build-web/index.data _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
